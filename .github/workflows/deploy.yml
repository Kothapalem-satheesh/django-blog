# CD: Deploy workflow (runs after CI passes on main)
# Add your deployment steps for Render, Railway, Heroku, or your server.

name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed
  workflow_dispatch:  # Allow manual run from GitHub Actions tab

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    # Only run if CI succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django check and collectstatic (build validation)
        env:
          DJANGO_SETTINGS_MODULE: blog_main.settings
          SECRET_KEY: "ci-build-secret-key-for-validation-only"
          DEBUG: "False"
          ALLOWED_HOSTS: "*"
        run: |
          python manage.py check --deploy
          python manage.py collectstatic --noinput --clear 2>/dev/null || true

      # --- Add your deployment steps below ---
      # Example: Deploy to Render
      # - name: Deploy to Render
      #   env:
      #     RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      #   run: curl -X POST "$RENDER_DEPLOY_HOOK"

      # Example: Deploy to Railway
      # - name: Deploy to Railway
      #   uses: bervProject/railway-deploy@main
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deployment placeholder
        run: echo "Add your deployment step above (Render, Railway, SSH, etc.). Build validation passed."
